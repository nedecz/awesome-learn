site_name: Awesome Learn
site_description: Learning resources for CI/CD, cloud computing, commerce systems, databases, Docker, frontend development, Angular, Git, Infrastructure as Code, Kubernetes, microservices, networking, observability, security, system design, terminal tools, and .NET/C#
repo_url: https://github.com/nedecz/awesome-learn
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.top
