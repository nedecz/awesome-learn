name: Build Book

on:
  workflow_dispatch:
    inputs:
      mdbook_version:
        description: "mdBook version to use"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: ${{ inputs.mdbook_version }}

      - name: Build book
        run: mdbook build writebook

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: awesome-learn-book
          path: writebook/book
          retention-days: 30
